name: Build & Push to Docker Hub (multi-arch)

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: dockerhub-new-easyepg-main
  cancel-in-progress: true

env:
  REPO: docker.io/railsimulatornet/new-easyepg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      date_tag: ${{ steps.vars.outputs.date_tag }}
      build_tag: ${{ steps.vars.outputs.build_tag }}

    steps:
      - name: Generate tags
        id: vars
        shell: bash
        run: |
          DATE_TAG="$(TZ=Europe/Berlin date +%d%m%Y)"
          BUILD_TAG="build-${GITHUB_SHA}"

          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"

          echo "DATE_TAG=${DATE_TAG}"
          echo "BUILD_TAG=${BUILD_TAG}"

  build-arch:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile.amd64
            platform: linux/amd64
            suffix: amd64
          - dockerfile: Dockerfile.arm64v8
            platform: linux/arm64
            suffix: arm64
          - dockerfile: Dockerfile.arm32v7
            platform: linux/arm/v7
            suffix: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Strip legacy qemu/cross-build lines (ARM Dockerfiles)
        shell: bash
        run: |
          for f in Dockerfile.arm64v8 Dockerfile.arm32v7; do
            [[ -f "$f" ]] || continue
            sed -i '/qemu-.*-static/d;/QEMU_EXECVE/d;/cross-build-start/d;/cross-build-end/d' "$f" || true
          done
          echo "Patched Dockerfiles (if needed)."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.platform }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REPO }}:${{ needs.prep.outputs.build_tag }}-${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ env.REPO }}:cache-${{ matrix.suffix }}
          cache-to: type=registry,mode=max,ref=${{ env.REPO }}:cache-${{ matrix.suffix }}

  manifest:
    needs: [prep, build-arch]
    runs-on: ubuntu-latest

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & Push multi-arch manifest (:date)
        shell: bash
        run: |
          docker buildx imagetools create \
            -t $REPO:$DATE_TAG \
            $REPO:$BUILD_TAG-amd64 \
            $REPO:$BUILD_TAG-arm64 \
            $REPO:$BUILD_TAG-armv7
        env:
          REPO: ${{ env.REPO }}
          DATE_TAG: ${{ needs.prep.outputs.date_tag }}
          BUILD_TAG: ${{ needs.prep.outputs.build_tag }}

      - name: Create & Push multi-arch manifest (:latest)
        shell: bash
        run: |
          docker buildx imagetools create \
            -t $REPO:latest \
            $REPO:$BUILD_TAG-amd64 \
            $REPO:$BUILD_TAG-arm64 \
            $REPO:$BUILD_TAG-armv7
        env:
          REPO: ${{ env.REPO }}
          BUILD_TAG: ${{ needs.prep.outputs.build_tag }}

      - name: Summary
        shell: bash
        run: |
          echo "Published tags:"
          echo "  - $REPO:${DATE_TAG}"
          echo "  - $REPO:latest"
        env:
          REPO: ${{ env.REPO }}
          DATE_TAG: ${{ needs.prep.outputs.date_tag }}
